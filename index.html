<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>今天想点什么</title>
    <meta
      name="description"
      content="一个静态点菜小网页，支持分类、购物车、订单码生成与导入。"
    />
    <link rel="stylesheet" href="./styles.css?v=9" />
  </head>
  <body>
    <div class="page-shell">
      <main class="app-frame">
        <header class="hero hero-order">
          <div class="hero-copy">
            <h1>今天想吃什么</h1>
          </div>
          <a class="link-chip" href="./import.html">导入订单</a>
        </header>

        <section class="store-summary">
          <div class="store-copy">
            <strong>女朋友专属点单</strong>
          </div>
          <button id="clearCartBtn" class="text-button" type="button">清空</button>
        </section>

        <section class="order-layout">
          <aside class="category-rail">
            <div id="categoryTabs" class="category-tabs" role="tablist" aria-label="商品分类"></div>
          </aside>

          <section class="menu-panel">
            <div class="section-heading section-heading-compact">
              <div>
                <p id="categoryLabel" class="section-kicker"></p>
                <h2 id="categoryTitle"></h2>
              </div>
            </div>
            <div id="menuGrid" class="menu-grid" aria-live="polite"></div>
          </section>
        </section>
      </main>
    </div>

    <button id="cartFab" class="cart-fab" type="button" aria-haspopup="dialog" aria-expanded="false">
      <span class="cart-badge" id="cartCount">0</span>
      <span class="cart-copy">
        <strong id="cartSummary">购物车还是空的</strong>
        <span id="cartMeta">先选商品，再去结算</span>
      </span>
      <span class="cart-submit">去结算</span>
    </button>

    <div id="cartDrawer" class="cart-drawer" aria-hidden="true">
      <div id="drawerBackdrop" class="drawer-backdrop"></div>
      <section class="drawer-panel" role="dialog" aria-modal="true" aria-label="购物车">
        <header class="drawer-header">
          <div>
            <p class="section-kicker">购物车</p>
          </div>
          <button id="closeDrawerBtn" class="icon-button" type="button" aria-label="关闭购物车">x</button>
        </header>

        <div id="cartItems" class="cart-items"></div>

        <footer class="drawer-footer">
          <div class="footer-copy footer-copy-compact">
            <strong id="footerCount">0 件商品</strong>
          </div>
          <div class="footer-actions">
            <button id="copyOrderBtn" class="primary-button" type="button">确认并生成订单</button>
          </div>
          <section id="orderResultCard" class="order-result-card hidden">
            <label class="code-label" for="orderCodeOutput">订单码</label>
            <textarea
              id="orderCodeOutput"
              class="code-output code-output-compact"
              rows="2"
              readonly
              placeholder="选完商品后，这里会生成一串可复制的订单码。"
            ></textarea>
          </section>
          <p id="copyHint" class="hint-text"></p>
        </footer>
      </section>
    </div>

    <template id="menuItemTemplate">
      <article class="menu-card">
        <div class="menu-image">
          <img class="menu-photo" alt="" loading="lazy" />
          <span class="menu-image-badge">待放图片</span>
        </div>
        <div class="menu-body">
          <div class="menu-topline">
            <span class="menu-tag"></span>
          </div>
          <h3 class="menu-name"></h3>
          <p class="menu-description"></p>
          <span class="menu-selected"></span>
          <div class="menu-actions">
            <button class="qty-button minus-button" type="button" aria-label="减少数量">-</button>
            <span class="qty-value">0</span>
            <button class="qty-button plus-button" type="button" aria-label="增加数量">+</button>
          </div>
        </div>
      </article>
    </template>

    <template id="cartItemTemplate">
      <article class="cart-item">
        <div class="cart-item-copy">
          <span class="cart-item-category"></span>
          <h3 class="cart-item-name"></h3>
        </div>
        <div class="menu-actions cart-actions">
          <button class="qty-button minus-button" type="button" aria-label="减少数量">-</button>
          <span class="qty-value">0</span>
          <button class="qty-button plus-button" type="button" aria-label="增加数量">+</button>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js?v=9"></script>
  </body>
</html>
